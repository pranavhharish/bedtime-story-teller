<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bedtime Story Teller — System Architecture</title>
<desc>Flowchart showing the full pipeline from user input through mythology mapping, story generation, LLM judge critique-revise loop, and Streamlit output.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .arr { stroke: #888; stroke-width: 1.2; fill: none; }
    .ui-bg   { fill: #e1f5ee; stroke: #0f6e56; }
    .cat-box { fill: #eeedfe; stroke: #534ab7; }
    .gen-box { fill: #eeedfe; stroke: #534ab7; }
    .jdg-box { fill: #faece7; stroke: #993c1d; }
    .out-box { fill: #e1f5ee; stroke: #0f6e56; }
    .ann-box { fill: #faeeda; stroke: #854f0b; }
    .ann-ts  { font-size: 12px; fill: #633806; }
    .dec     { fill: #f1efe8; stroke: #5f5e5a; }
    .dec-th  { font-size: 13px; font-weight: 600; fill: #2c2c2a; }
    .dec-ts  { font-size: 11px; fill: #5f5e5a; }
    .rw-box  { fill: #faece7; stroke: #993c1d; }
    .lbl     { font-size: 11px; fill: #888; }
  </style>
</defs>

<!-- ── STREAMLIT UI container (input) ── -->
<rect x="40" y="28" width="600" height="108" rx="14" class="ui-bg" stroke-width="0.8" fill-opacity="0.25"/>
<text class="th" x="340" y="52" text-anchor="middle">Streamlit UI — input</text>

<rect x="64"  y="64" width="168" height="60" rx="8" class="ui-bg" stroke-width="0.6"/>
<text class="th" x="148" y="88"  text-anchor="middle" dominant-baseline="central">Story idea</text>
<text class="ts" x="148" y="106" text-anchor="middle" dominant-baseline="central">Free-text prompt</text>

<rect x="256" y="64" width="148" height="60" rx="8" class="ui-bg" stroke-width="0.6"/>
<text class="th" x="330" y="88"  text-anchor="middle" dominant-baseline="central">Character name</text>
<text class="ts" x="330" y="106" text-anchor="middle" dominant-baseline="central">Optional</text>

<rect x="424" y="64" width="196" height="60" rx="8" class="ui-bg" stroke-width="0.6"/>
<text class="th" x="522" y="88"  text-anchor="middle" dominant-baseline="central">Age + wishes</text>
<text class="ts" x="522" y="106" text-anchor="middle" dominant-baseline="central">5–7 or 8–10</text>

<!-- StoryRequest arrow -->
<line x1="340" y1="136" x2="340" y2="166" class="arr" marker-end="url(#arrow)"/>
<text class="lbl" x="356" y="155">StoryRequest</text>

<!-- ── CATEGORIZER ── -->
<rect x="190" y="166" width="300" height="60" rx="8" class="cat-box" stroke-width="0.6"/>
<text class="th" x="340" y="190" text-anchor="middle" dominant-baseline="central">Categorizer</text>
<text class="ts" x="340" y="210" text-anchor="middle" dominant-baseline="central">Maps input → mythology archetype</text>

<!-- Mythology annotation -->
<rect x="40" y="166" width="130" height="60" rx="8" class="ann-box" stroke-width="0.6"/>
<text class="th"  x="105" y="188" text-anchor="middle" dominant-baseline="central" style="fill:#412402">Mythology</text>
<text class="ann-ts" x="105" y="207" text-anchor="middle" dominant-baseline="central">6-tier context block</text>
<line x1="170" y1="196" x2="188" y2="196" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- MythologyMapping arrow -->
<line x1="340" y1="226" x2="340" y2="258" class="arr" marker-end="url(#arrow)"/>
<text class="lbl" x="356" y="246">MythologyMapping</text>

<!-- ── GENERATOR ── -->
<rect x="190" y="258" width="300" height="60" rx="8" class="gen-box" stroke-width="0.6"/>
<text class="th" x="340" y="282" text-anchor="middle" dominant-baseline="central">Story Generator</text>
<text class="ts" x="340" y="302" text-anchor="middle" dominant-baseline="central">6-beat arc · mythology soul</text>

<!-- Arc annotation -->
<rect x="40" y="258" width="130" height="60" rx="8" class="ann-box" stroke-width="0.6"/>
<text class="th"  x="105" y="278" text-anchor="middle" dominant-baseline="central" style="fill:#412402">Arc template</text>
<text class="ann-ts" x="105" y="296" text-anchor="middle" dominant-baseline="central">Setup→struggle→wisdom</text>
<line x1="170" y1="288" x2="188" y2="288" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- story text arrow -->
<line x1="340" y1="318" x2="340" y2="350" class="arr" marker-end="url(#arrow)"/>
<text class="lbl" x="356" y="338">story text</text>

<!-- ── JUDGE ── -->
<rect x="190" y="350" width="300" height="78" rx="8" class="jdg-box" stroke-width="0.6"/>
<text class="th" x="340" y="376" text-anchor="middle" dominant-baseline="central">LLM Judge</text>
<text class="ts" x="340" y="396" text-anchor="middle" dominant-baseline="central">6-dimension rubric · JSON critique</text>
<text class="ts" x="340" y="414" text-anchor="middle" dominant-baseline="central">Age · Arc · Warmth · Pacing · Engage · Myth</text>

<!-- Rubric annotation -->
<rect x="510" y="350" width="130" height="78" rx="8" class="ann-box" stroke-width="0.6"/>
<text class="th"  x="575" y="374" text-anchor="middle" dominant-baseline="central" style="fill:#412402">Rubric JSON</text>
<text class="ann-ts" x="575" y="392" text-anchor="middle" dominant-baseline="central">scores + critique</text>
<text class="ann-ts" x="575" y="410" text-anchor="middle" dominant-baseline="central">priority fixes</text>
<line x1="490" y1="389" x2="508" y2="389" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Arrow to decision -->
<line x1="340" y1="428" x2="340" y2="460" class="arr" marker-end="url(#arrow)"/>

<!-- Decision diamond -->
<polygon points="340,460 400,494 340,528 280,494" class="dec" stroke-width="0.8"/>
<text class="dec-th" x="340" y="490" text-anchor="middle" dominant-baseline="central">score</text>
<text class="dec-ts" x="340" y="508" text-anchor="middle" dominant-baseline="central">≥ 4.0?</text>

<!-- NO → Rewriter loop -->
<text class="lbl" x="272" y="490" text-anchor="middle" dominant-baseline="central">No</text>
<path d="M280 494 L178 494 L178 316 L188 316" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Rewriter box -->
<rect x="40" y="445" width="130" height="56" rx="8" class="rw-box" stroke-width="0.6"/>
<text class="th" x="105" y="467" text-anchor="middle" dominant-baseline="central">Rewriter</text>
<text class="ts" x="105" y="485" text-anchor="middle" dominant-baseline="central">Fix weak dims only</text>
<path d="M178 494 L170 494 L170 473 L170 473" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

<text class="lbl" x="105" y="516" text-anchor="middle">max 3 iterations</text>
<text class="lbl" x="105" y="530" text-anchor="middle">best score tracked</text>

<!-- YES → output -->
<text class="lbl" x="412" y="490" text-anchor="middle" dominant-baseline="central">Yes</text>
<line x1="340" y1="528" x2="340" y2="566" class="arr" marker-end="url(#arrow)"/>

<!-- ── STORY OUTPUT ── -->
<rect x="190" y="566" width="300" height="60" rx="8" class="out-box" stroke-width="0.6"/>
<text class="th" x="340" y="590" text-anchor="middle" dominant-baseline="central">Story Output</text>
<text class="ts" x="340" y="610" text-anchor="middle" dominant-baseline="central">Best story · judge scores · mapping</text>

<!-- arrow to Streamlit output -->
<line x1="340" y1="626" x2="340" y2="660" class="arr" marker-end="url(#arrow)"/>

<!-- ── STREAMLIT OUTPUT container ── -->
<rect x="40" y="660" width="600" height="128" rx="14" class="ui-bg" stroke-width="0.8" fill-opacity="0.25"/>
<text class="th" x="340" y="684" text-anchor="middle">Streamlit UI — output</text>

<rect x="64"  y="696" width="150" height="72" rx="8" class="ui-bg" stroke-width="0.6"/>
<text class="th" x="139" y="720" text-anchor="middle" dominant-baseline="central">Story panel</text>
<text class="ts" x="139" y="740" text-anchor="middle" dominant-baseline="central">Mythology card</text>
<text class="ts" x="139" y="756" text-anchor="middle" dominant-baseline="central">Download .txt</text>

<rect x="234" y="696" width="150" height="72" rx="8" class="ui-bg" stroke-width="0.6"/>
<text class="th" x="309" y="720" text-anchor="middle" dominant-baseline="central">Score bars</text>
<text class="ts" x="309" y="740" text-anchor="middle" dominant-baseline="central">6-dim progress</text>
<text class="ts" x="309" y="756" text-anchor="middle" dominant-baseline="central">Overall score</text>

<rect x="404" y="696" width="216" height="72" rx="8" class="ui-bg" stroke-width="0.6"/>
<text class="th" x="512" y="716" text-anchor="middle" dominant-baseline="central">Revision input</text>
<text class="ts" x="512" y="734" text-anchor="middle" dominant-baseline="central">User feedback loop</text>
<text class="ts" x="512" y="752" text-anchor="middle" dominant-baseline="central">→ targeted rewrite</text>

</svg>
